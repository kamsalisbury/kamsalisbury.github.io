<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <!-- <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" /> Commented out to test Bulma implementation -->
    <!-- <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" /> Moved to meta.html -->

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <section class="section"><!-- <div class="wrapper-masthead"> -->
      <div class="container is-fluid">
        <div class="columns"><!-- <header class="masthead clearfix"> -->
          <div class="column">
            <figure class="image is-64x64">
              <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" /></a>
            </figure>
          </div>
          <div class="column">
            <div class="site-info">
              <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
              <p class="site-description">{{ site.description }}</p>
            </div>
          </div>
          <div class="column">
            <nav>
              <a href="{{ site.baseurl }}/">Blog</a>
              <!-- <a href="{{ site.baseurl }}/about">About</a> -->
            </nav>
          </div>
        </div><!-- </header> -->
      </div>
    </section><!-- </div> -->

    <section class="section">
      <div id="main" role="main" class="container is-fluid">
        {{ content }}
      </div>
    </section>

    <section class="section"><!-- <div class="wrapper-footer"> -->
      <div class="container is-fluid">
        <footer class="footer">
          <div class="content has-text-centered">
            {% include svg-icons.html %}
          </div>
        </footer>
      </div>
    </section><!-- </div> -->

    {% include analytics.html %}
  </body>
</html>
