<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
  </head>

  <body>
    <section class="section">
      <nav class="navbar" role="navigation" aria-label="main navigation"> <!-- Bulma NavBar https://bulma.io/documentation/components/navbar/ -->
        <div class="navbar-brand">
          <a class="navbar-item" href="{{ site.baseurl }}/">
            <!-- <figure class="image is-128x128"> -->
              <img src="{{ site.avatar }}" alt="{{ site.name }}" />
            <!-- /figure> -->
          </a>
          <h4 class="navbar-item">
            {{ site.name }} ~ {{ site.description }} <!-- Using just navbar brand to keep display simple and brief, no hamburger on touch -->
          </h4>
        </div>
        </div>
      </nav>
    </section>

    <section class="section">
      <div id="main" role="main" class="container is-fluid">
        <div class="content">
          {{ content }}
        </div>
      </div>
    </section>

    <section class="section">
      <div class="container is-fluid">
        <footer class="footer">
          <div class="content has-text-centered">
            {% include svg-icons.html %}
          </div>
        </footer>
      </div>
    </section>

    {% include analytics.html %}
  </body>
</html>
